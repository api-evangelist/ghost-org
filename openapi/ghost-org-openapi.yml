  /admin/labels/{id}/:
    put:
      operationId: editAdminLabel
      tags: [Admin - Labels]
      summary: Update a label
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/PathId'
      requestBody:
