  /admin/offers/{id}/:
    put:
      operationId: editAdminOffer
      tags: [Admin - Offers]
      summary: Update an offer
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: The updated offer.
  /admin/newsletters/:
    get:
      operationId: browseAdminNewsletters
      tags: [Admin - Newsletters]
      summary: Browse newsletters
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
      responses:
        '200':
          description: A list of newsletters.
    post:
      operationId: addAdminNewsletter
      tags: [Admin - Newsletters]
      summary: Create a newsletter
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: The created newsletter.
  /admin/newsletters/{id}/:
    put:
      operationId: editAdminNewsletter
      tags: [Admin - Newsletters]
      summary: Update a newsletter
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: The updated newsletter.
  /admin/users/:
    get:
      operationId: browseAdminUsers
      tags: [Admin - Users]
      summary: Browse staff users
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/Include'
      responses:
        '200':
          description: A list of staff users.
  /admin/users/{id}/:
    get:
      operationId: readAdminUserById
      tags: [Admin - Users]
      summary: Read a staff user by ID
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: The requested user.
  /admin/users/slug/{slug}/:
    get:
      operationId: readAdminUserBySlug
      tags: [Admin - Users]
      summary: Read a staff user by slug
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/PathSlug'
      responses:
        '200':
          description: The requested user.
  /admin/site/:
    get:
      operationId: readAdminSite
      tags: [Admin - Site]
      summary: Read public site metadata
      description: Returns basic public site data including title, url, and version.
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
      responses:
        '200':
          description: The site metadata.
  /admin/images/upload/:
    post:
      operationId: uploadAdminImage
      tags: [Admin - Images]
      summary: Upload an image
      description: >-
        Uploads an image using multipart/form-data and returns the stored URL
        for referencing the image in post or page content.
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                purpose:
                  type: string
                  enum: [image, profile_image, icon]
                ref:
                  type: string
      responses:
        '201':
          description: The uploaded image URL.
  /admin/themes/upload/:
    post:
      operationId: uploadAdminTheme
      tags: [Admin - Themes]
      summary: Upload a theme
      description: Uploads a theme as a zip package using multipart/form-data.
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: The uploaded theme.
  /admin/themes/{name}/activate/:
    put:
      operationId: activateAdminTheme
      tags: [Admin - Themes]
      summary: Activate a theme
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The activated theme.
  /admin/webhooks/:
    post:
      operationId: addAdminWebhook
      tags: [Admin - Webhooks]
      summary: Create a webhook
      description: >-
        Registers an outbound webhook that fires on a Ghost event (for example
        post.published, member.added). There is no endpoint to read existing
        webhooks.
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhooksRequest'
      responses:
        '201':
          description: The created webhook.
  /admin/webhooks/{id}/:
    put:
      operationId: editAdminWebhook
      tags: [Admin - Webhooks]
      summary: Update a webhook
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhooksRequest'
      responses:
        '200':
          description: The updated webhook.
    delete:
      operationId: deleteAdminWebhook
      tags: [Admin - Webhooks]
      summary: Delete a webhook
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/PathId'
      responses:
        '204':
          description: The webhook was deleted.
components:
  securitySchemes:
    contentApiKey:
      type: apiKey
      in: query
      name: key
      description: >-
        Content API key from a Custom Integration, passed as the `key` query
        parameter. Safe for browser use; grants read-only access to public data.
    adminJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Admin API access. An Admin API key (id:secret) is used to sign a
        short-lived JWT sent as `Authorization: Ghost {token}`. A staff access
        token or an authenticated user session may also be used.
  parameters:
    ContentKey:
      name: key
      in: query
      required: true
      description: Content API key.
      schema:
        type: string
    AcceptVersion:
      name: Accept-Version
      in: header
      required: false
      description: Minimum compatible API version, for example v5.0.
      schema:
        type: string
        example: v5.0
    PathId:
      name: id
      in: path
      required: true
      description: The resource ID.
      schema:
        type: string
    PathSlug:
      name: slug
      in: path
      required: true
      description: The resource slug.
      schema:
        type: string
    Include:
      name: include
      in: query
      required: false
      description: Comma-separated related data to include (for example authors,tags).
      schema:
        type: string
    Fields:
      name: fields
      in: query
      required: false
      description: Comma-separated list of fields to return.
      schema:
        type: string
    Filter:
      name: filter
      in: query
      required: false
      description: Ghost NQL filter expression.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: Number of records per page (default 15, or 'all').
      schema:
        type: string
        default: '15'
    Page:
      name: page
      in: query
      required: false
      description: Page number of results to return.
      schema:
        type: integer
        default: 1
    Order:
      name: order
      in: query
      required: false
      description: Sort order, for example 'published_at desc'.
      schema:
        type: string
    Formats:
      name: formats
      in: query
      required: false
      description: Content formats to return, for example 'html,lexical'.
      schema:
        type: string
    Source:
      name: source
      in: query
      required: false
      description: Set to 'html' to supply post/page content as HTML instead of Lexical.
      schema:
        type: string
        enum: [html]
  responses:
    Unauthorized:
      description: Authentication failed or was missing.
    NotFound:
      description: The requested resource was not found.
  schemas:
    PostsRequest:
      type: object
      properties:
        posts:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              lexical:
                type: string
              html:
                type: string
              status:
                type: string
                enum: [draft, published, scheduled]
              updated_at:
                type: string
                format: date-time
    PagesRequest:
      type: object
      properties:
        pages:
          type: array
          items:
            type: object
    MembersRequest:
      type: object
      properties:
        members:
          type: array
          items:
            type: object
            properties:
              email:
                type: string
              name:
                type: string
              note:
                type: string
    TagsRequest:
      type: object
      properties:
        tags:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              slug:
                type: string
              description:
                type: string
    WebhooksRequest:
      type: object
      properties:
        webhooks:
          type: array
          items:
            type: object
            properties:
              event:
                type: string
                example: post.published
              target_url:
                type: string
                format: uri
              name:
                type: string
              secret:
                type: string
