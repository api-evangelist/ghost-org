    delete:
      operationId: deleteAdminTag
      tags: [Admin - Tags]
      summary: Delete a tag
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/PathId'
      responses:
        '204':
          description: The tag was deleted.
  /admin/labels/:
    get:
