meters:
- name: ghost_pro_subscription
  description: Flat monthly or annual Ghost(Pro) plan fee, tiered by staff and member limits.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: members
  description: Audience size on Ghost(Pro), the primary lever that moves you between plan tiers.
  unit: members
  aggregation: max
  dimensions:
  - account
- name: email_volume
  description: Newsletter emails sent; on self-hosted deployments this is billed by your email provider (for example Mailgun).
  unit: emails
  aggregation: sum
  dimensions:
  - account
  - newsletter
- name: self_hosted_infrastructure
  description: Compute, storage, and bandwidth for running a self-hosted Ghost instance (no Ghost invoice).
  unit: hours
  aggregation: sum
  dimensions:
  - deployment
principles:
- name: Visibility
  description: Track member growth against your Ghost(Pro) tier limit and monitor newsletter email volume, which drives cost on self-hosted email providers.
- name: Allocation
  description: Attribute the Ghost(Pro) subscription and email costs to the publication or team that owns the site.
- name: Optimization
  description: Choose self-hosting to trade a subscription for owned infrastructure when volume justifies it; right-size the Ghost(Pro) tier to actual staff and member counts; prune inactive members to stay within tier limits.
- name: Accountability
  description: Review the monthly Ghost(Pro) invoice (or self-hosted infrastructure and email spend) against audience growth and publishing activity.
