description: >-
  FinOps view of Ghost spend. Ghost's core platform is open source (MIT) and
  free to self-host - in that model the cost is your own compute, storage,
  bandwidth, and transactional email (for newsletters) with no vendor invoice.
  Ghost(Pro) is the managed offering, billed as a flat monthly (or discounted
  annual) subscription per tier, where the primary cost drivers are staff-user
  count and member (audience) size rather than API usage. The Content and Admin
  APIs are included at no extra charge in every model. Subscription revenue
  collected through Ghost memberships incurs no Ghost commission (Stripe
  processing fees apply).
notes: >-
  Ghost(Pro) per-tier rates are captured in the plans file and should be
  re-verified on the pricing page. For self-hosted deployments the dominant
  costs are infrastructure and email-sending volume (for example Mailgun),
  not a Ghost license fee.
