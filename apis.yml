aid: ghost-org
url: https://raw.githubusercontent.com/api-evangelist/ghost-org/refs/heads/main/apis.yml
name: Ghost
kind: company
description: >-
  Ghost is an open-source (MIT) publishing platform for professional
  publications, newsletters, memberships, and paid subscriptions. It can be
  self-hosted for free or run as the managed Ghost(Pro) service, with all
  Ghost(Pro) revenue funding the non-profit Ghost Foundation. Every Ghost site
  exposes two documented public REST APIs under
  https://{site}/ghost/api/. The Content API is a read-only, key-authenticated
  interface for delivering published posts, pages, tags, authors, tiers, and
  settings to front-ends and static sites. The Admin API is a read-write,
  token-authenticated (JWT) interface for managing posts, pages, members,
  tags, tiers, offers, newsletters, users, media, themes, and webhooks.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Publishing
- Newsletters
- Memberships
- Subscriptions
- CMS
- Open Source
- Content
created: '2026-07-05'
modified: '2026-07-05'
specificationVersion: '0.19'
apis:
- aid: ghost-org:ghost-content-api
  name: Ghost Content API
  tags:
  - Content
  - Read Only
  - Posts
  - Publishing
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.ghost.org/content-api
  baseURL: https://{admin_domain}/ghost/api/content
  properties:
  - url: https://docs.ghost.org/content-api
    type: Documentation
  - url: https://docs.ghost.org/content-api
    type: APIReference
  - url: openapi/ghost-org-openapi.yml
    type: OpenAPI
  - url: collections/ghost-org.postman_collection.json
    type: PostmanCollection
  - url: collections/ghost-org.opencollection.json
    type: OpenCollection
  description: >-
    Read-only, key-authenticated REST API that delivers published content -
    posts, pages, authors, tags, tiers, and public settings - to front-ends,
    static site generators, and mobile apps. Authenticated with a Content API
    key passed as a query parameter; supports browse, read-by-id, and
    read-by-slug plus filter, include, fields, order, and pagination.
- aid: ghost-org:ghost-admin-posts-api
  name: Ghost Admin Posts API
  tags:
  - Posts
  - Content
  - Admin
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.ghost.org/admin-api/posts
  baseURL: https://{admin_domain}/ghost/api/admin
  properties:
  - url: https://docs.ghost.org/admin-api/posts
    type: Documentation
  - url: https://docs.ghost.org/admin-api
    type: APIReference
  - url: openapi/ghost-org-openapi.yml
    type: OpenAPI
  - url: collections/ghost-org.postman_collection.json
    type: PostmanCollection
  - url: collections/ghost-org.opencollection.json
    type: OpenCollection
  description: >-
    Read-write management of posts - browse, read by id or slug, create,
    update, and delete. Content is stored as Lexical and can be requested or
    supplied as HTML via the source and formats parameters. Requires an Admin
    API token (JWT) or staff access token.
- aid: ghost-org:ghost-admin-pages-api
  name: Ghost Admin Pages API
  tags:
  - Pages
  - Content
  - Admin
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.ghost.org/admin-api/pages
  baseURL: https://{admin_domain}/ghost/api/admin
  properties:
  - url: https://docs.ghost.org/admin-api/pages
    type: Documentation
  - url: openapi/ghost-org-openapi.yml
    type: OpenAPI
  - url: collections/ghost-org.postman_collection.json
    type: PostmanCollection
  - url: collections/ghost-org.opencollection.json
    type: OpenCollection
  description: >-
    Read-write management of static pages - browse, read by id or slug, create,
    update, and delete. Pages share the post data model but are not part of the
    chronological content feed.
- aid: ghost-org:ghost-admin-members-api
