  properties:
  - url: https://docs.ghost.org/admin-api/members
    type: Documentation
  - url: openapi/ghost-org-openapi.yml
    type: OpenAPI
  - url: collections/ghost-org.postman_collection.json
    type: PostmanCollection
  - url: collections/ghost-org.opencollection.json
    type: OpenCollection
  description: >-
    Manage the membership audience - browse, read, create, and update members,
    including their newsletter subscriptions, labels, and comp/paid status.
    Underpins Ghost's memberships and paid-subscription features.
- aid: ghost-org:ghost-admin-tags-labels-api
  name: Ghost Admin Tags and Labels API
  tags:
  - Tags
  - Labels
  - Taxonomy
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.ghost.org/admin-api/tags
