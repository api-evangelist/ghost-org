  - Email
  - Publishing
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.ghost.org/admin-api/newsletters
  baseURL: https://{admin_domain}/ghost/api/admin
  properties:
  - url: https://docs.ghost.org/admin-api/newsletters
    type: Documentation
  - url: openapi/ghost-org-openapi.yml
    type: OpenAPI
  - url: collections/ghost-org.postman_collection.json
    type: PostmanCollection
  - url: collections/ghost-org.opencollection.json
    type: OpenCollection
  description: >-
    Manage the newsletters a publication sends - browse, read, create, and
    update newsletter definitions including sender details, design, and
    subscription behavior. A single Ghost site can run multiple newsletters.
- aid: ghost-org:ghost-admin-users-site-api
  name: Ghost Admin Users and Site API
  tags:
  - Users
  - Staff
  - Site
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.ghost.org/admin-api/users
  baseURL: https://{admin_domain}/ghost/api/admin
  properties:
  - url: https://docs.ghost.org/admin-api/users
    type: Documentation
  - url: openapi/ghost-org-openapi.yml
    type: OpenAPI
  - url: collections/ghost-org.postman_collection.json
    type: PostmanCollection
  - url: collections/ghost-org.opencollection.json
    type: OpenCollection
  description: >-
    Read-only access to staff users (browse and read by id or slug) and to
    public site metadata via the /site/ endpoint, which returns title, url,
    and version - useful for verifying connectivity and rendering site chrome.
- aid: ghost-org:ghost-admin-media-api
  name: Ghost Admin Media and Themes API
  tags:
  - Images
  - Media
  - Themes
  - Uploads
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.ghost.org/admin-api/images
  baseURL: https://{admin_domain}/ghost/api/admin
  properties:
  - url: https://docs.ghost.org/admin-api/images
    type: Documentation
  - url: openapi/ghost-org-openapi.yml
    type: OpenAPI
  - url: collections/ghost-org.postman_collection.json
    type: PostmanCollection
  - url: collections/ghost-org.opencollection.json
    type: OpenCollection
  description: >-
    Upload assets and manage presentation - multipart image uploads via
    /images/upload/, and theme package upload plus activation via /themes/.
    Returns stored URLs for referencing images in post and page content.
- aid: ghost-org:ghost-admin-webhooks-api
  name: Ghost Admin Webhooks API
  tags:
  - Webhooks
  - Events
  - Integrations
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.ghost.org/admin-api/webhooks
  baseURL: https://{admin_domain}/ghost/api/admin
  properties:
  - url: https://docs.ghost.org/admin-api/webhooks
    type: Documentation
  - url: openapi/ghost-org-openapi.yml
    type: OpenAPI
  - url: collections/ghost-org.postman_collection.json
    type: PostmanCollection
  - url: collections/ghost-org.opencollection.json
    type: OpenCollection
  description: >-
    Register outbound webhooks that fire on Ghost events (for example
    post.published, member.added, page.published) to trigger site rebuilds,
    notifications, or downstream automation. Supports create, update, and
    delete; there is no endpoint to read existing webhooks.
