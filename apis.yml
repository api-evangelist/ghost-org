  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.ghost.org/admin-api/tiers
  baseURL: https://{admin_domain}/ghost/api/admin
  properties:
  - url: https://docs.ghost.org/admin-api/tiers
    type: Documentation
  - url: openapi/ghost-org-openapi.yml
    type: OpenAPI
  - url: collections/ghost-org.postman_collection.json
    type: PostmanCollection
  - url: collections/ghost-org.opencollection.json
    type: OpenCollection
  description: >-
    Manage subscription tiers and promotional offers that define paid access
    to a publication - browse, read, create, and update tiers and offers with
    their pricing, benefits, and discount configuration.
- aid: ghost-org:ghost-admin-newsletters-api
  name: Ghost Admin Newsletters API
  tags:
