  - url: openapi/ghost-org-openapi.yml
    type: OpenAPI
  - url: collections/ghost-org.postman_collection.json
    type: PostmanCollection
  - url: collections/ghost-org.opencollection.json
    type: OpenCollection
  description: >-
    Read-write management of tags (content taxonomy) and labels (member
    segmentation) - browse, read, create, update, and delete. Tags organize
    posts and pages; labels group members.
- aid: ghost-org:ghost-admin-tiers-offers-api
  name: Ghost Admin Tiers and Offers API
  tags:
  - Tiers
