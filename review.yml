sources:
  - url: https://docs.ghost.org/content-api
    type: Documentation
    note: Content API base URL, key query-parameter auth, and browse/read endpoints. All REST. No WebSocket mentioned.
  - url: https://docs.ghost.org/admin-api
    type: Documentation
    note: Admin API base URL, JWT/token auth, and resource endpoints. All REST.
  - url: https://docs.ghost.org/admin-api/webhooks
    type: APIReference
    note: Webhooks are outbound HTTP POSTs on events; create/update/delete only. Not a WebSocket surface.
  - url: https://ghost.org/pricing/
    type: Pricing
    note: Ghost(Pro) tiers plus the free self-hosted open-source option.
  - url: https://github.com/TryGhost/Ghost
    type: SourceCode
    note: Open-source (MIT) publishing platform, self-hostable.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Ghost's own public API is
    request/response REST (Content API and Admin API). No AsyncAPI document was
    created because there is no server-push transport on Ghost's own API to
    model; the event surface is outbound webhooks, which are server-to-endpoint
    HTTP callbacks rather than a client-connected WebSocket stream.
